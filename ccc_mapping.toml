# fixed-array, extensible-array, and v2-B-tree readers instead of one monolithic
# `H5D__chunk_read` body.

# `read_slice` is intentionally unmapped, and `read_virtual_dataset` is also
# left unmapped under strict 1:1 matching. `H5D__virtual_read` is a large C-side
# engine, while the Rust code keeps that behavior split across layout decode,
# source-open, selection materialization, and copy helpers.

# `decode_value` is intentionally unmapped under strict 1:1 matching. The Rust
# dataset value decoder is a recursive HDF5-object reader spanning scalar,
# compound, array, vlen, and reference cases, not a direct analog of libhdf5's
# struct-conversion engine.

