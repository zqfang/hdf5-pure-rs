# Pure deserialize halves get the canonical C-side targets. Wrappers
# (`read_super_block`, `read_index_block`, `read_data_block`) are now
# thin compose-only and intentionally unmapped — they fall through to
# fingerprint matching, which is fine since they no longer carry the bulk
# of the parsing logic.
