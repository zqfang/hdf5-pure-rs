# Rust ↔ C function name mapping for ccc-rs cross-language compare.
#
# Used with:
#   ccc-rs compare hdf5_rust.json hdf5_c.json --mapping ccc_mapping.toml
#   ccc-rs missing hdf5_rust.json hdf5_c.json --mapping ccc_mapping.toml
#   ccc-rs constants-diff hdf5_rust.json hdf5_c.json --mapping ccc_mapping.toml
#
# Mapping rules:
# - "rust"       — Rust function name as ccc-rs sees it (no module path).
# - "rust_path"  — optional path-suffix constraint on the Rust source file,
#                  used to disambiguate names that appear in multiple modules.
# - "other"      — upstream C symbol from hdf5/src/H5*.c.
# - "other_path" — optional path-suffix constraint on the C source file.
# - Pure Rust helpers with no C analog (read_u32, ensure_available, finalize,
#   etc.) are intentionally omitted.

# C macro/control-flow/platform artifacts that tree-sitter can surface as
# pseudo-functions in heavily macroized libhdf5 sources. These are not
# translation targets and should not count as missing Rust functions.
ignore_other = [
  "ALL_MEMBERS",
  "FUNC_LEAVE_NOAPI_NAMECHECK_ONLY",
  "H5_BEFORE_USER_CB",
  "H5_BEFORE_USER_CB_NOERR",
  "H5_ITER_ERROR",
  "HADDR_UNDEF",
  "HDqsort_context",
  "HDqsort_context_wrapper_func",
  "HDqsort_fallback",
  "HDqsort_fallback_wrapper",
  "HDvasprintf",
  "HERROR",
  "HGOTO_ERROR",
  "NDEBUG",
  "Nflock",
  "Pflock",
  "UNIQUE_MEMBERS",
  "Wflock",
  "Wgettimeofday",
  "Wopen",
  "Wremove",
  "Wsetenv",
  "assert",
  "hdfs__fprint_stats",
  "hdfs__reset_stats",
  "snprintf",
]

collapse_other_duplicates = true

# ---------------------------------------------------------------------------
# format/checksum.rs — H5checksum.c (Jenkins lookup3, metadata checksum)
# ---------------------------------------------------------------------------
[[entries]]
rust = "checksum_lookup3"
rust_path = "format/checksum.rs"
other = "H5_checksum_lookup3"

[[entries]]
rust = "checksum_metadata"
rust_path = "format/checksum.rs"
other = "H5_checksum_metadata"

# ---------------------------------------------------------------------------
# format/superblock.rs — H5Fsuper_cache.c
# Single dispatching C deserializer for all superblock versions.
# ---------------------------------------------------------------------------
# `H5F__cache_superblock_deserialize` is intentionally unmapped under strict
# 1:1 matching. The Rust reader keeps the version-dispatch split across
# `read_v0_v1` and `read_v2_v3`, while the C cache deserializer remains a
# single multi-version body.

[[entries]]
rust = "validate_sizes"
rust_path = "format/superblock.rs"
other = "H5F__superblock_prefix_decode"

