[[entries]]
rust = "fmt"
rust_path = "error.rs"
other = "H5Eget_msg"

[[entries]]
rust = "source"
rust_path = "error.rs"
other = "H5Ewalk2"

[[entries]]
rust = "from"
rust_path = "error.rs"
other = "H5E_push"

[[entries]]
rust = "default"
rust_path = "engine/handle.rs"
other = "H5I_init_interface"

# ---------------------------------------------------------------------------
# Constructor `new` methods → corresponding C `_create` / `_init` paths.
# ---------------------------------------------------------------------------
# `Allocator::new` is intentionally unmapped under strict 1:1 matching. It is
# a tiny Rust constructor, not a meaningful owner of libhdf5's allocator init
# path.

[[entries]]
rust = "new"
rust_path = "engine/handle.rs"
rust_class = "HandleRegistry"
other = "H5I_init_interface"

[[entries]]
rust = "new"
rust_path = "filters/nbit.rs"
other = "H5Z__nbit_set_local"

[[entries]]
rust = "new"
rust_path = "filters/scaleoffset.rs"
other = "H5Z__scaleoffset_set_local"

[[entries]]
rust = "new"
rust_path = "hl/dataset_builder.rs"
other = "H5Pcreate"

